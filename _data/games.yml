    週次でのフィードバックサイクルを通じて、仕様変更に柔軟に対応する設計力や、エンジニア以外の職種とも円滑に連携するビジネスコミュニケーション能力を養っています。

- title: "MECHADOOM"
  id: "mechadoom"
  thumbnail: "assets/images/games/MECHADOOM_thumbnail.png"
  screenshot_base: "assets/images/games/MECHADOOM_"
  screenshot_count: 7
  screenshot_ext: ".png"
