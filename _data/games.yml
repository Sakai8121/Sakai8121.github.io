    しかし、「めんこを叩きつける」というアナログな感覚を、ボタン操作やマウス入力でもっとうまく表現するべきというフィードバックをもらった。
    ゲームの「手触り感」を表現する技術を習得する重要性を学び、「ゲームの手触り感」に関心を持つきっかけとなった。

- title: "RatioPuzzle"
  id: "ratio"
  thumbnail: "assets/images/games/RatioPuzzle_thumbnail.png"
  screenshot_base: "assets/images/games/RatioPuzzle_"
  screenshot_count: 3
  screenshot_ext: ".png"
  url: "/games/RatioPazleWebgl/"
  period: "3か月 (大学1年 夏)"
  role: "ソロ制作"
  tech_stack: ["Unity", "C#", "2D Puzzle"]
  description: |
    初めて完成させた作品。「比（Ratio）」をテーマにした直感型パズルRPG。
    Listを使わずに(知らなかった)作ったくらい、とにかくまず自分のイメージを形にしたいというがむしゃらな気持ちがあったことが懐かしい。
  learning: |
    **ゲームメカニクスの検証**
    とにかく直感的に深く考えずに遊べて、爽快感があるゲームを目指した。
    しかし、「比」という言葉が説明に入ると途端に難しそうに感じてしまうと遊んでもらったときに感じた。
    正確にはわからないが、視覚的に今どのくらいの比であるかを風船みたいな演出で見せればもっとわかりやすかったなと今更(大学4年)思った。
