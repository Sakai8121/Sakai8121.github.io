  period: "1週間 (Unity1Week)"
  role: "ソロ制作"
  tech_stack: ["Unity", "C＃"]
  description: |
    サバイバル系ゲームにどのような追加要素があったら面白いかを考え作ってみた作品です。
  learning: |
    **リスクリターンをただ作ればいいってもんじゃないのか**
   プレイヤーを分身させるほど攻撃力が高くなるが、分身すると当たり判定がでかくなるというリスクリターンがある。
   ただ、この増やすタイミングの意思決定に明確に「ここ」っていうタイミングがないことが問題だと思っている。
   当初は、あと少しで倒せるのに逃げて行ってしまうというときに増やすというイメージだったが、敵が多すぎたか、
   その敵を倒すことでどれほどの報酬がもらえるのかという期待感が分かりずらいことが原因に思える。
   もっとボスみたいなフェーズを作ってもよかったな。あと難易度調整が相変わらず難しい…

