  action_label: "Play (Web)"
  sub_links:
    - label: "Google Play"
      url: "https://play.google.com/store/apps/details?id=com.ant.UnbelievableAntKingdom"
      icon: "fab fa-google-play"
  period: "約1年半 (大学3年〜4年初頭)"
  role: "チーム制作 (クライアント実装 / UI・演出担当)"
  tech_stack: ["Unity", "C#", "Google Play Console", "Firebase"]
  description: |
    Google PlayおよびUnityRoomにて公開中の、連鎖爆発で設計図を強化する新感覚パズルアクションゲームです。
    「世界観・アート・操作感が統一された、一つのパッケージとして完成されたアプリ」をリリースすることを目標に開発しました。モバイル特有のタッチ操作や、没入感を高めるUI/UXデザインにこだわっています。
  learning: |
    **モバイルアプリのリリースから運用まで**
    企画・開発だけでなく、Google Play Consoleでのリリース手順、審査対応、Firebaseを用いた分析までを一貫して経験しました。
    企画段階では共同制作者と議論を重ねましたが、最終的に「連鎖」というコアメカニクスを確立し、リリースまで完遂しました。次回作に向けて、リテンション（継続率）向上施策やマネタイズ設計の重要性を痛感し、分析を行っています。

- title: "Who am I"
  id: "whoami"
  thumbnail: "assets/images/games/WhoamI_thumbnail.png"
  screenshot_base: "assets/images/games/WhoamI_"
  screenshot_count: 3
  screenshot_ext: ".png"
  url: "https://unityroom.com/games/whoam_i"
  period: "1週間 (Unity1Week)"
  role: "ソロ制作"
  tech_stack: ["Unity", "C#", "WebGL"]
  description: |
    Unity1Week（お題：「あい」）への参加作品です。
    画面上を動き回る大量の図形の中から、自分の操作（回転・加速）に同期して動く「自分（I）」を素早く見つけ出すゲームです。
    ゲシュタルト崩壊のような視覚的感覚を利用し、シンプルながら「アハ体験」を感じられるゲームシステムをデザインしました。
  learning: |
    **短期間でのコアメカニクス検証**
    1週間という限られた期間、かつ並行タスクがある中で、「面白さの核」を最小限のリソースで表現することに注力しました。
    スコープ（開発範囲）を適切に管理し、期間内にバグの少ない状態で完成させるタイムマネジメント力と、要件定義力を養いました。

- title: "タスクと罰"
  id: "task_punishment"
  thumbnail: "https://placehold.co/600x340/1a1a1a/7f00ff?text=Task+App"
  screenshot_base: "assets/images/games/TaskApp_"
  screenshot_count: 0
