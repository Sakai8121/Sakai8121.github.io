    短期間で、設計パターンの学習にフォーカスして開発しました。
  learning: |
    **設計思想（MVPパターン）の実践**
    これまで自己流だったコード構造を見直し、MVP（Model-View-Presenter）パターンとUniRx（リアクティブプログラミング）を導入。
    これにより、ロジックと描画の責務が分離され、コードの可読性と保守性が向上したように思えます。

