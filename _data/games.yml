  action_label: "View PDF"
  period: "4か月 (授業制作)"
  role: "チーム制作 (メインプログラマ)"
  tech_stack: ["Kotlin", "Android Studio", "Git", "MVVM"]
  description: |
    「タスクを完了できないと罰ゲームが発生する」というゲーミフィケーション要素を取り入れたTo-Doアプリです。
    大学の授業課題として4か月間、企画・設計・実装・テストの全工程を行いました。
    全7チーム中、コンセプトの独自性と実装力が評価され「殊勲賞（MVP相当）」を受賞しました。
  learning: |
    **Androidネイティブ開発とチームマネジメント**
    Androidのライフサイクルやイベント駆動設計（Kotlin）、MVVMアーキテクチャなどを実地で学びました。
    リードプログラマとして、Gitを用いたチーム開発フローの構築や、新言語（Kotlin）習得のサポートを主導。技術的な課題解決だけでなく、チームのモチベーション管理も含めたプロジェクト進行を経験しました。

