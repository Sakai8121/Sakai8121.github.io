  action_label: "Steam Page"
  period: "制作中 (大学4年夏ごろから)"
  role: "チーム制作 (メインプログラマー / 企画)"
  tech_stack: ["Unreal Engine 5", "C++", "Steamworks", "Multiplayer"]
  description: |
    Steamでの商業リリースを前提に開発中の、闇工場シミュレーションゲームです。
    「実際に売れるクオリティ」と「収益化」を明確な目標として設定しています。ゲーム性は『Repo』や『Peak』のような協力プレイ作品を参考とし、友達と悪事をはたらいているようなマルチプレイ体験を目指しています。
  learning: |
    **マルチプレイ機能とUEへの挑戦**
    UEでの開発、マルチプレイ機能の実装、Steamでリリースすることにも興味があったため、全部まとめて挑戦することにしました。
    学習と平行して開発を進めることは大変です。それでも『アイテム』や『調査員』には拡張性を持たせるような設計を考えたり、
    マルチプレイに対応するためにペイロード構造体などを作ったりと、独学ですが工夫しながら開発しています。

- title: "MECHADOOM"
  id: "mechadoom"
  thumbnail: "assets/images/games/MECHADOOM_thumbnail.png"
  screenshot_base: "assets/images/games/MECHADOOM_"
  screenshot_count: 7
  screenshot_ext: ".png"
  url: "https://bitsummit-gamejam.itch.io/mechadoom"
  period: "3～4か月 (大学3年 夏)"
  role: チーム制作 (メインプログラマー / 企画)"
  tech_stack: ["Unity", "C#", "3D Action", "Team Dev"]
  description: |
    BitSummit GameJamにて制作した3Dメカアクションゲーム。
    東京の学生混成チーム（6名）で開発を行い、**ゲームデザイン賞(ゲームジャム内)**を受賞しました。
  learning: |
    **チーム開発とUXの追求**
    企画・実装の大部分を担当。チーム開発特有のコミュニケーションの難しさを経験しつつ、それを乗り越えて受賞できたことは大きな自信になりました。
    実装の工夫として、すべての敵が一塊になって追ってこないように、プログラムを作成しました。これによって大勢の敵に周囲を囲まれる体験を提供できました。（エルデンリング、バイオハザードの実装の工夫を参考にした）
    また、企画についても、GameJamのテーマであった「OverPower」にあった良いリスクとリターンのある企画ができたと思います。ただ、難易度調整と手触りには課題が残りました。
  download_required: true

- title: "UnbelievableAntKingdom"
  id: "ant"
  thumbnail: "assets/images/games/UnbelievableAntKingdom_thumbnail.png"
