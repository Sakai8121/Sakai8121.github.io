  description: |
    ゲーム開発会社にて、エンジニアとして実務に携わっています。
    エンターテインメント目的のゲームだけでなく、社会課題の解決や教育などを目的とした「ゲーミフィケーション（シリアスゲーム）」の開発を行っています。
  learning: |
    **顧客視点とアジャイルな開発プロセス**
