  period: "3～4か月 (大学3年 夏)"
  role: "リードプログラマ / 企画"
  tech_stack: ["Unity", "C#", "3D Action", "Team Dev"]
  description: |
    BitSummit GameJamにて制作した3Dメカアクションゲーム。
    東京の学生混成チーム（6名）で開発を行い、**ゲームデザイン賞**を受賞しました。
  learning: |
    **チーム開発とUXの追求**
    企画・実装の大部分を担当。チーム開発特有のコミュニケーションの難しさを経験しつつ、それを乗り越えて受賞できたことは大きな自信になりました。
    実装の工夫として、すべての敵が一塊になって追ってこないように、AIプログラムを作成した。これによって大勢の敵に周囲を囲まれる体験を提供できた。（エルデンリング、バイオハザードの実装の工夫を参考にした）
    また、企画についても、GameJamのテーマであった「OverPower」にあった良いリスクとリターンのある企画ができたと思う。ただ、難易度調整には課題が残った。
  download_required: true

