  period: "3か月 (大学2年 夏)"
  role: "ソロ制作"
  tech_stack: ["Unity", "C#", "Puzzle Action"]
  description: |
    サイコロの出目によって挙動が変わるランアクションゲーム。
    クッキーランのようなランゲームに一工夫入れて面白くすることを目指しました。
  learning: |
    **物理演算とロジックの使い分け**
    物理演算（Physics）に頼りすぎた結果、挙動が不安定になる課題に直面しました。
    この失敗から、「確実な動作が必要な部分はロジック（座標計算）で管理し、演出部分のみ物理演算を使う」という実装の鉄則を学びました。また、難易度調整（レベルデザイン）の難しさを肌で感じた経験でもあります。

- title: "MenkoBattle"
  id: "menko"
  thumbnail: "assets/images/games/MenkoBattle_thumbnail.png"
  screenshot_base: "assets/images/games/MenkoBattle_"
