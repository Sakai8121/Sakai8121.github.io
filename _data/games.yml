  action_label: "Play (Web)"
  sub_links:
    - label: "Google Play"
      url: "https://play.google.com/store/apps/details?id=com.ant.UnbelievableAntKingdom"
      icon: "fab fa-google-play"
  period: "約1年半 (大学3年〜4年初頭)"
  role: "チーム制作 (メインプログラマー / 企画)"
  tech_stack: ["Unity", "C#", "Google Play Console", "Firebase"]
  description: |
    Google PlayおよびUnityRoomにて公開中の、連鎖爆発で設計図を強化する新感覚パズルアクションゲームです。
    「デザインが統一された、一つの完成されたアプリ」をリリースすることを目標に開発しました。鉱石以外のドット絵を自分で書きましたが、アセットのありがたみをしみじみと感じました…
  learning: |
    **モバイルアプリのリリース**
    企画・開発だけでなく、Google Play Consoleでのリリース手順、Firebaseを用いたランキング機能の実装、広告機能の実装までを一貫して経験しました。
    企画段階では共同制作者と議論を重ねましたが、最終的に「連鎖」というコアメカニクスを基にリリースまで完遂しました。この開発時から設計という概念を初めて知り、共同制作者であるサークルの先輩から教えていただきながら作りました。
    しかし、最終的にはコードの設計自体はひどい出来になってしまいました。ただ、この失敗を基に成長も出来たと感じています。

