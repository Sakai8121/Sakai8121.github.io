  action_label: "Steam Page"
  period: "制作中 (リリース予定)"
  role: "チーム制作 (リードエンジニア / 企画)"
  tech_stack: ["Unreal Engine 5", "C++", "Steamworks", "Multiplayer"]
  description: |
    Steamでの商業リリースを前提に開発中の、闇工場シミュレーションゲームです。
    「実際に売れるクオリティ」と「収益化」を明確な目標として設定しています。ゲーム性は『Repo』や『Peak』のような協力プレイ作品を参考とし、友達と悪事をはたらいているようなマルチプレイ体験の提供を目指しています。
  learning: |
    **商業ベースの品質管理と技術的挑戦**
    Steamworks SDKを用いた実績・ロビー機能の実装や、マルチプレイにおけるReplication（通信同期）処理の最適化に取り組んでいます。
    また、Web公開作品とは異なり、有償販売に耐えうるデバッグ体制やユーザー体験（UX）の設計など、プロフェッショナルな製品開発プロセスを実践しています。

- title: "UnbelievableAntKingdom"
  id: "ant"
  thumbnail: "assets/images/games/UnbelievableAntKingdom_thumbnail.png"
  screenshot_base: "assets/images/games/UnbelievableAntKingdom_"
  screenshot_count: 11
